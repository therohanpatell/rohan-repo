# =============================================================================
#  DATAPLEX CLOUD DQ — COMPREHENSIVE RULES YAML
#  Project  : LTC Workforce Intelligence Platform
#  Author   : Data Engineering Team
#  Version  : 1.0
#  Updated  : 2026-03
# =============================================================================
#
#  STRUCTURE OVERVIEW
#  ------------------
#  1. metadata_registry_defaults  → Where your Dataplex lake/zone lives
#  2. row_filters                 → Reusable WHERE-clause filters
#  3. rules                       → Reusable rule definitions (the "what")
#  4. rule_bindings               → Bind rules to specific table.column (the "where")
#
#  RULE TYPES COVERED IN THIS FILE
#  --------------------------------
#  NOT_NULL              - Column must not have NULL values
#  NOT_BLANK             - Column must not be empty string / whitespace
#  REGEX                 - Column must match a regex pattern
#  RANGE                 - Column value must be within min/max bounds
#  CUSTOM_SQL_EXPR       - Any SQL expression that returns TRUE/FALSE per row
#  CUSTOM_SQL_STATEMENT  - A full SQL query that returns a count of failing rows
#
# =============================================================================


# =============================================================================
# SECTION 1 — METADATA REGISTRY DEFAULTS
# =============================================================================
# Tells CloudDQ which GCP project + Dataplex lake/zone to use.
# These values are the defaults; individual rule_bindings can override them.

metadata_registry_defaults:
  dataplex:
    projects: project-a                    # GCP Project ID where Dataplex lives
    locations: asia-south1                 # GCP region
    lakes: ltc-data-lake                   # Your Dataplex Lake ID
    zones: raw-zone                        # Your Dataplex Zone ID


# =============================================================================
# SECTION 2 — ROW FILTERS
# =============================================================================
# Reusable SQL WHERE-clause snippets. Apply to rule_bindings to scope checks
# to only a subset of rows (e.g., active employees, current month records).
# The special filter NONE means "check all rows — no filter applied".

row_filters:

  # ── No filter (checks all rows) ───────────────────────────────────────────
  NONE:
    filter_sql_expr: "True"

  # ── Employee domain filters ───────────────────────────────────────────────
  ACTIVE_EMPLOYEES_ONLY:
    filter_sql_expr: "employee_status = 'ACTIVE'"

  LEAVERS_ONLY:
    filter_sql_expr: "employee_status = 'LEAVER'"

  CURRENT_MONTH_RECORDS:
    # Rows where the record's date falls within the current calendar month
    filter_sql_expr: >
      DATE_TRUNC(record_date, MONTH) = DATE_TRUNC(CURRENT_DATE(), MONTH)

  LAST_30_DAYS:
    filter_sql_expr: "record_date >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY)"

  LTC_INDIA_ONLY:
    filter_sql_expr: "legal_entity_country = 'IN'"

  FULL_TIME_EMPLOYEES:
    filter_sql_expr: "employment_type IN ('FULL_TIME', 'FTC')"

  ABSENCE_CURRENT_YEAR:
    filter_sql_expr: "EXTRACT(YEAR FROM absence_start_date) = EXTRACT(YEAR FROM CURRENT_DATE())"

  HYBRID_OFFICE_VISITS:
    filter_sql_expr: "visit_type = 'OFFICE'"

  COMPLETED_LEARNING:
    filter_sql_expr: "completion_status = 'COMPLETED'"


# =============================================================================
# SECTION 3 — RULES
# =============================================================================
# Reusable rule templates. Define once, apply to many columns/tables.
# Rules use $column as a placeholder — it is replaced at runtime by the
# actual column name specified in the rule_binding.

rules:

  # ===========================================================================
  # RULE TYPE 1: NOT_NULL
  # Purpose : Fails if any row has NULL in the target column.
  # Use for : Mandatory fields — IDs, statuses, dates that must always exist.
  # ===========================================================================

  NOT_NULL:
    rule_type: NOT_NULL
    dimension: completeness

  # ===========================================================================
  # RULE TYPE 2: NOT_BLANK
  # Purpose : Fails if any row has an empty string '' or whitespace-only value.
  # Use for : String fields that must have meaningful content, not just spaces.
  # Note    : Combine with NOT_NULL for full coverage.
  # ===========================================================================

  NOT_BLANK:
    rule_type: NOT_BLANK
    dimension: completeness

  # ===========================================================================
  # RULE TYPE 3: REGEX
  # Purpose : Validates column values against a regular expression pattern.
  # Use for : Formatted fields — employee IDs, email, dates, phone numbers.
  # ===========================================================================

  # Employee ID must follow pattern: uppercase letter + 7 digits (e.g. A1234567)
  REGEX_EMPLOYEE_ID_FORMAT:
    rule_type: REGEX
    dimension: conformance
    params:
      pattern: "^[A-Z][0-9]{7}$"

  # Email must be a valid Lloyds internal email format
  REGEX_LLOYDS_EMAIL:
    rule_type: REGEX
    dimension: conformance
    params:
      pattern: "^[a-zA-Z0-9._%+\\-]+@lloydsbankinggroup\\.com$"

  # Date string fields must follow ISO 8601: YYYY-MM-DD
  REGEX_DATE_FORMAT_ISO:
    rule_type: REGEX
    dimension: conformance
    params:
      pattern: "^[0-9]{4}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[01])$"

  # Cost centre must be numeric, 6 digits
  REGEX_COST_CENTRE:
    rule_type: REGEX
    dimension: conformance
    params:
      pattern: "^[0-9]{6}$"

  # Grade code: uppercase letters only, 1-5 chars (e.g. G, GA, GS1)
  REGEX_GRADE_CODE:
    rule_type: REGEX
    dimension: conformance
    params:
      pattern: "^[A-Z0-9]{1,5}$"

  # ===========================================================================
  # RULE TYPE 4: RANGE
  # Purpose : Validates numeric/date column values fall within min and max.
  # Use for : Age, tenure, scores, absence days, headcount, learning hours.
  # Note    : min/max are inclusive. Set to null to leave one side unbounded.
  # ===========================================================================

  # Absence days per record: between 0.5 and 365
  RANGE_ABSENCE_DAYS:
    rule_type: RANGE
    dimension: validity
    params:
      min: 0.5
      max: 365

  # Performance score: 1 to 5 (Workday performance rating scale)
  RANGE_PERFORMANCE_SCORE:
    rule_type: RANGE
    dimension: validity
    params:
      min: 1
      max: 5

  # Learning hours: 0 to 2000 hours per year max
  RANGE_LEARNING_HOURS:
    rule_type: RANGE
    dimension: validity
    params:
      min: 0
      max: 2000

  # Age at hire: between 16 and 75
  RANGE_AGE_AT_HIRE:
    rule_type: RANGE
    dimension: validity
    params:
      min: 16
      max: 75

  # Headcount: must be a positive integer (>=1)
  RANGE_HEADCOUNT_POSITIVE:
    rule_type: RANGE
    dimension: validity
    params:
      min: 1
      max: null    # No upper bound

  # Office visit duration in hours: 1 to 24
  RANGE_VISIT_HOURS:
    rule_type: RANGE
    dimension: validity
    params:
      min: 1
      max: 24

  # ===========================================================================
  # RULE TYPE 5: CUSTOM_SQL_EXPR
  # Purpose : A SQL expression evaluated per row. Must return TRUE (pass)
  #           or FALSE (fail). Use $column as placeholder for column name.
  # Use for : Domain-specific business rules that built-in types can't handle.
  # ===========================================================================

  # Employee status must be one of the valid Workday values
  CUSTOM_VALID_EMPLOYEE_STATUS:
    rule_type: CUSTOM_SQL_EXPR
    dimension: validity
    params:
      custom_sql_expr: |-
        $column IN (
          'ACTIVE',
          'LEAVER',
          'ON_LEAVE',
          'SUSPENDED',
          'PRE_HIRE'
        )

  # Absence type must be a valid code from the agreed reference list
  CUSTOM_VALID_ABSENCE_TYPE:
    rule_type: CUSTOM_SQL_EXPR
    dimension: validity
    params:
      custom_sql_expr: |-
        $column IN (
          'SICK_SHORT_TERM',
          'SICK_LONG_TERM',
          'ANNUAL_LEAVE',
          'MATERNITY',
          'PATERNITY',
          'SHARED_PARENTAL',
          'COMPASSIONATE',
          'UNPAID',
          'PUBLIC_HOLIDAY',
          'STUDY_LEAVE'
        )

  # Employment type must be a valid code
  CUSTOM_VALID_EMPLOYMENT_TYPE:
    rule_type: CUSTOM_SQL_EXPR
    dimension: validity
    params:
      custom_sql_expr: |-
        $column IN ('FULL_TIME', 'PART_TIME', 'FTC', 'CONTRACTOR', 'APPRENTICE')

  # Leave end date must be >= leave start date (referential date logic)
  CUSTOM_ABSENCE_END_AFTER_START:
    rule_type: CUSTOM_SQL_EXPR
    dimension: consistency
    params:
      custom_sql_expr: |-
        absence_end_date >= absence_start_date

  # Hire date must not be in the future
  CUSTOM_HIRE_DATE_NOT_FUTURE:
    rule_type: CUSTOM_SQL_EXPR
    dimension: validity
    params:
      custom_sql_expr: |-
        $column <= CURRENT_DATE()

  # Leave date must be after hire date (leavers only)
  CUSTOM_LEAVE_DATE_AFTER_HIRE:
    rule_type: CUSTOM_SQL_EXPR
    dimension: consistency
    params:
      custom_sql_expr: |-
        leave_date > hire_date

  # Office visit date must not be in the future
  CUSTOM_VISIT_DATE_NOT_FUTURE:
    rule_type: CUSTOM_SQL_EXPR
    dimension: validity
    params:
      custom_sql_expr: |-
        $column <= CURRENT_DATE()

  # Learning completion date must be >= enrollment date
  CUSTOM_COMPLETION_AFTER_ENROLLMENT:
    rule_type: CUSTOM_SQL_EXPR
    dimension: consistency
    params:
      custom_sql_expr: |-
        completion_date >= enrollment_date

  # Hybrid work percentage: 0-100 with max 2 decimal places
  CUSTOM_HYBRID_PERCENT_VALID:
    rule_type: CUSTOM_SQL_EXPR
    dimension: validity
    params:
      custom_sql_expr: |-
        $column BETWEEN 0 AND 100
        AND ROUND($column, 2) = $column

  # Performance rating cannot be NULL for active employees who passed review period
  CUSTOM_PERF_RATING_REQUIRED_ACTIVE:
    rule_type: CUSTOM_SQL_EXPR
    dimension: completeness
    params:
      custom_sql_expr: |-
        NOT (employee_status = 'ACTIVE'
             AND tenure_months > 12
             AND $column IS NULL)

  # Recruitment: offer date must be before or equal to joining date
  CUSTOM_OFFER_BEFORE_JOINING:
    rule_type: CUSTOM_SQL_EXPR
    dimension: consistency
    params:
      custom_sql_expr: |-
        offer_date <= joining_date

  # ===========================================================================
  # RULE TYPE 6: CUSTOM_SQL_STATEMENT
  # Purpose : A complete SQL query that returns a scalar integer — the COUNT
  #           of FAILING rows. Returns 0 = all rows pass. Returns N = N fails.
  # Use for : Cross-table referential integrity, aggregation-level checks,
  #           dataset-level uniqueness, and complex multi-column validations.
  # Note    : $table is replaced by the fully qualified table name at runtime.
  # ===========================================================================

  # Uniqueness: employee_id must be unique across the entire table
  CUSTOM_SQL_EMPLOYEE_ID_UNIQUE:
    rule_type: CUSTOM_SQL_STATEMENT
    dimension: uniqueness
    params:
      custom_sql_statement: |-
        SELECT COUNT(*) AS n
        FROM (
          SELECT employee_id
          FROM $table
          GROUP BY employee_id
          HAVING COUNT(*) > 1
        )

  # Uniqueness: (employee_id + absence_start_date) must be unique per record
  CUSTOM_SQL_ABSENCE_RECORD_UNIQUE:
    rule_type: CUSTOM_SQL_STATEMENT
    dimension: uniqueness
    params:
      custom_sql_statement: |-
        SELECT COUNT(*) AS n
        FROM (
          SELECT employee_id, absence_start_date
          FROM $table
          GROUP BY employee_id, absence_start_date
          HAVING COUNT(*) > 1
        )

  # Referential integrity: every employee_id in absence table must exist
  # in the employee master table
  CUSTOM_SQL_ABSENCE_EMP_REF_INTEGRITY:
    rule_type: CUSTOM_SQL_STATEMENT
    dimension: integrity
    params:
      custom_sql_statement: |-
        SELECT COUNT(*) AS n
        FROM $table AS a
        WHERE NOT EXISTS (
          SELECT 1
          FROM `project-a.employee_curation.employee_master` AS e
          WHERE e.employee_id = a.employee_id
        )

  # Referential integrity: every employee_id in hybrid_working table must
  # exist in employee master
  CUSTOM_SQL_HYBRID_EMP_REF_INTEGRITY:
    rule_type: CUSTOM_SQL_STATEMENT
    dimension: integrity
    params:
      custom_sql_statement: |-
        SELECT COUNT(*) AS n
        FROM $table AS h
        WHERE NOT EXISTS (
          SELECT 1
          FROM `project-a.employee_curation.employee_master` AS e
          WHERE e.employee_id = h.employee_id
        )

  # Freshness: staging table must have been loaded today (no stale data)
  CUSTOM_SQL_DATA_FRESHNESS_TODAY:
    rule_type: CUSTOM_SQL_STATEMENT
    dimension: timeliness
    params:
      custom_sql_statement: |-
        SELECT
          CASE
            WHEN MAX(DATE(ingestion_timestamp)) < CURRENT_DATE()
            THEN 1 ELSE 0
          END AS n
        FROM $table

  # Completeness: active headcount must not drop >20% vs prior week
  # (detects accidental mass-deletes in staging)
  CUSTOM_SQL_HEADCOUNT_DROP_CHECK:
    rule_type: CUSTOM_SQL_STATEMENT
    dimension: completeness
    params:
      custom_sql_statement: |-
        WITH current_count AS (
          SELECT COUNT(*) AS cnt
          FROM $table
          WHERE employee_status = 'ACTIVE'
            AND DATE(ingestion_timestamp) = CURRENT_DATE()
        ),
        prior_count AS (
          SELECT COUNT(*) AS cnt
          FROM $table
          WHERE employee_status = 'ACTIVE'
            AND DATE(ingestion_timestamp) = DATE_SUB(CURRENT_DATE(), INTERVAL 7 DAY)
        )
        SELECT
          CASE
            WHEN prior_count.cnt > 0
             AND (current_count.cnt / prior_count.cnt) < 0.80
            THEN 1 ELSE 0
          END AS n
        FROM current_count, prior_count

  # Volume check: table must have at least 100 rows (guards against empty loads)
  CUSTOM_SQL_MIN_ROW_COUNT:
    rule_type: CUSTOM_SQL_STATEMENT
    dimension: completeness
    params:
      custom_sql_statement: |-
        SELECT
          CASE WHEN COUNT(*) < 100 THEN 1 ELSE 0 END AS n
        FROM $table


# =============================================================================
# SECTION 4 — RULE BINDINGS
# =============================================================================
# This is where rules are applied to specific table + column combinations.
#
# FORMAT:
#   BINDING_ID:
#     entity_uri    : BigQuery table path
#     column_id     : Column to apply the rule to
#     row_filter_id : Which row_filter to use (scope the rows checked)
#     rule_ids      : List of rules to apply to this column
#
# NAMING CONVENTION: <DOMAIN>__<TABLE>__<COLUMN>__<RULE_SHORTNAME>
# =============================================================================


rule_bindings:

  # ===========================================================================
  # DOMAIN: EMPLOYEE DETAILS  (Workday HCM core — staging layer)
  # Table : employee_staging.employee_details
  # ===========================================================================

  # --- Completeness checks ---

  EMP__STAGING__EMPLOYEE_ID__NOT_NULL:
    entity_uri: "bigquery://projects/project-a/datasets/employee_staging/tables/employee_details"
    column_id: employee_id
    row_filter_id: NONE
    rule_ids:
      - NOT_NULL

  EMP__STAGING__FULL_NAME__NOT_NULL:
    entity_uri: "bigquery://projects/project-a/datasets/employee_staging/tables/employee_details"
    column_id: full_name
    row_filter_id: NONE
    rule_ids:
      - NOT_NULL
      - NOT_BLANK

  EMP__STAGING__EMAIL__NOT_NULL:
    entity_uri: "bigquery://projects/project-a/datasets/employee_staging/tables/employee_details"
    column_id: work_email
    row_filter_id: ACTIVE_EMPLOYEES_ONLY
    rule_ids:
      - NOT_NULL
      - NOT_BLANK

  EMP__STAGING__HIRE_DATE__NOT_NULL:
    entity_uri: "bigquery://projects/project-a/datasets/employee_staging/tables/employee_details"
    column_id: hire_date
    row_filter_id: NONE
    rule_ids:
      - NOT_NULL

  EMP__STAGING__COST_CENTRE__NOT_NULL:
    entity_uri: "bigquery://projects/project-a/datasets/employee_staging/tables/employee_details"
    column_id: cost_centre
    row_filter_id: ACTIVE_EMPLOYEES_ONLY
    rule_ids:
      - NOT_NULL

  # --- Format / conformance checks ---

  EMP__STAGING__EMPLOYEE_ID__FORMAT:
    entity_uri: "bigquery://projects/project-a/datasets/employee_staging/tables/employee_details"
    column_id: employee_id
    row_filter_id: NONE
    rule_ids:
      - REGEX_EMPLOYEE_ID_FORMAT

  EMP__STAGING__EMAIL__FORMAT:
    entity_uri: "bigquery://projects/project-a/datasets/employee_staging/tables/employee_details"
    column_id: work_email
    row_filter_id: ACTIVE_EMPLOYEES_ONLY
    rule_ids:
      - REGEX_LLOYDS_EMAIL

  EMP__STAGING__COST_CENTRE__FORMAT:
    entity_uri: "bigquery://projects/project-a/datasets/employee_staging/tables/employee_details"
    column_id: cost_centre
    row_filter_id: ACTIVE_EMPLOYEES_ONLY
    rule_ids:
      - REGEX_COST_CENTRE

  EMP__STAGING__GRADE__FORMAT:
    entity_uri: "bigquery://projects/project-a/datasets/employee_staging/tables/employee_details"
    column_id: grade_code
    row_filter_id: ACTIVE_EMPLOYEES_ONLY
    rule_ids:
      - REGEX_GRADE_CODE

  # --- Validity checks ---

  EMP__STAGING__STATUS__VALID_VALUES:
    entity_uri: "bigquery://projects/project-a/datasets/employee_staging/tables/employee_details"
    column_id: employee_status
    row_filter_id: NONE
    rule_ids:
      - CUSTOM_VALID_EMPLOYEE_STATUS

  EMP__STAGING__EMPLOYMENT_TYPE__VALID:
    entity_uri: "bigquery://projects/project-a/datasets/employee_staging/tables/employee_details"
    column_id: employment_type
    row_filter_id: NONE
    rule_ids:
      - CUSTOM_VALID_EMPLOYMENT_TYPE

  EMP__STAGING__HIRE_DATE__NOT_FUTURE:
    entity_uri: "bigquery://projects/project-a/datasets/employee_staging/tables/employee_details"
    column_id: hire_date
    row_filter_id: NONE
    rule_ids:
      - CUSTOM_HIRE_DATE_NOT_FUTURE

  EMP__STAGING__LEAVE_DATE__AFTER_HIRE:
    entity_uri: "bigquery://projects/project-a/datasets/employee_staging/tables/employee_details"
    column_id: leave_date
    row_filter_id: LEAVERS_ONLY
    rule_ids:
      - CUSTOM_LEAVE_DATE_AFTER_HIRE

  EMP__STAGING__AGE_AT_HIRE__RANGE:
    entity_uri: "bigquery://projects/project-a/datasets/employee_staging/tables/employee_details"
    column_id: age_at_hire
    row_filter_id: NONE
    rule_ids:
      - RANGE_AGE_AT_HIRE

  # --- Uniqueness check ---

  EMP__STAGING__EMPLOYEE_ID__UNIQUE:
    entity_uri: "bigquery://projects/project-a/datasets/employee_staging/tables/employee_details"
    column_id: employee_id
    row_filter_id: NONE
    rule_ids:
      - CUSTOM_SQL_EMPLOYEE_ID_UNIQUE

  # --- Timeliness / freshness ---

  EMP__STAGING__FRESHNESS:
    entity_uri: "bigquery://projects/project-a/datasets/employee_staging/tables/employee_details"
    column_id: ingestion_timestamp
    row_filter_id: NONE
    rule_ids:
      - CUSTOM_SQL_DATA_FRESHNESS_TODAY

  # --- Volume guard ---

  EMP__STAGING__MIN_ROW_COUNT:
    entity_uri: "bigquery://projects/project-a/datasets/employee_staging/tables/employee_details"
    column_id: employee_id
    row_filter_id: NONE
    rule_ids:
      - CUSTOM_SQL_MIN_ROW_COUNT

  # --- Headcount anomaly detection ---

  EMP__STAGING__HEADCOUNT_DROP:
    entity_uri: "bigquery://projects/project-a/datasets/employee_staging/tables/employee_details"
    column_id: employee_id
    row_filter_id: NONE
    rule_ids:
      - CUSTOM_SQL_HEADCOUNT_DROP_CHECK


  # ===========================================================================
  # DOMAIN: ABSENCE RECORDS  (Workday absence data — staging layer)
  # Table : absence_staging.absence_records
  # ===========================================================================

  ABS__STAGING__EMPLOYEE_ID__NOT_NULL:
    entity_uri: "bigquery://projects/project-a/datasets/absence_staging/tables/absence_records"
    column_id: employee_id
    row_filter_id: NONE
    rule_ids:
      - NOT_NULL

  ABS__STAGING__ABSENCE_TYPE__NOT_NULL:
    entity_uri: "bigquery://projects/project-a/datasets/absence_staging/tables/absence_records"
    column_id: absence_type
    row_filter_id: NONE
    rule_ids:
      - NOT_NULL
      - NOT_BLANK

  ABS__STAGING__START_DATE__NOT_NULL:
    entity_uri: "bigquery://projects/project-a/datasets/absence_staging/tables/absence_records"
    column_id: absence_start_date
    row_filter_id: NONE
    rule_ids:
      - NOT_NULL

  ABS__STAGING__END_DATE__NOT_NULL:
    entity_uri: "bigquery://projects/project-a/datasets/absence_staging/tables/absence_records"
    column_id: absence_end_date
    row_filter_id: NONE
    rule_ids:
      - NOT_NULL

  ABS__STAGING__ABSENCE_DAYS__RANGE:
    entity_uri: "bigquery://projects/project-a/datasets/absence_staging/tables/absence_records"
    column_id: absence_days
    row_filter_id: NONE
    rule_ids:
      - RANGE_ABSENCE_DAYS

  ABS__STAGING__ABSENCE_TYPE__VALID:
    entity_uri: "bigquery://projects/project-a/datasets/absence_staging/tables/absence_records"
    column_id: absence_type
    row_filter_id: NONE
    rule_ids:
      - CUSTOM_VALID_ABSENCE_TYPE

  ABS__STAGING__END_AFTER_START:
    entity_uri: "bigquery://projects/project-a/datasets/absence_staging/tables/absence_records"
    column_id: absence_end_date
    row_filter_id: NONE
    rule_ids:
      - CUSTOM_ABSENCE_END_AFTER_START

  ABS__STAGING__RECORD_UNIQUE:
    entity_uri: "bigquery://projects/project-a/datasets/absence_staging/tables/absence_records"
    column_id: employee_id
    row_filter_id: NONE
    rule_ids:
      - CUSTOM_SQL_ABSENCE_RECORD_UNIQUE

  ABS__STAGING__EMP_REF_INTEGRITY:
    entity_uri: "bigquery://projects/project-a/datasets/absence_staging/tables/absence_records"
    column_id: employee_id
    row_filter_id: NONE
    rule_ids:
      - CUSTOM_SQL_ABSENCE_EMP_REF_INTEGRITY

  ABS__STAGING__FRESHNESS:
    entity_uri: "bigquery://projects/project-a/datasets/absence_staging/tables/absence_records"
    column_id: ingestion_timestamp
    row_filter_id: NONE
    rule_ids:
      - CUSTOM_SQL_DATA_FRESHNESS_TODAY


  # ===========================================================================
  # DOMAIN: HYBRID WORKING  (Office visit + WFH tracking)
  # Table : hybrid_staging.hybrid_working_records
  # ===========================================================================

  HYB__STAGING__EMPLOYEE_ID__NOT_NULL:
    entity_uri: "bigquery://projects/project-a/datasets/hybrid_staging/tables/hybrid_working_records"
    column_id: employee_id
    row_filter_id: NONE
    rule_ids:
      - NOT_NULL

  HYB__STAGING__VISIT_DATE__NOT_NULL:
    entity_uri: "bigquery://projects/project-a/datasets/hybrid_staging/tables/hybrid_working_records"
    column_id: visit_date
    row_filter_id: NONE
    rule_ids:
      - NOT_NULL

  HYB__STAGING__VISIT_DATE__NOT_FUTURE:
    entity_uri: "bigquery://projects/project-a/datasets/hybrid_staging/tables/hybrid_working_records"
    column_id: visit_date
    row_filter_id: NONE
    rule_ids:
      - CUSTOM_VISIT_DATE_NOT_FUTURE

  HYB__STAGING__HOURS__RANGE:
    entity_uri: "bigquery://projects/project-a/datasets/hybrid_staging/tables/hybrid_working_records"
    column_id: hours_in_office
    row_filter_id: HYBRID_OFFICE_VISITS
    rule_ids:
      - RANGE_VISIT_HOURS

  HYB__STAGING__HYBRID_PCT__VALID:
    entity_uri: "bigquery://projects/project-a/datasets/hybrid_staging/tables/hybrid_working_records"
    column_id: hybrid_work_percentage
    row_filter_id: NONE
    rule_ids:
      - CUSTOM_HYBRID_PERCENT_VALID

  HYB__STAGING__EMP_REF_INTEGRITY:
    entity_uri: "bigquery://projects/project-a/datasets/hybrid_staging/tables/hybrid_working_records"
    column_id: employee_id
    row_filter_id: NONE
    rule_ids:
      - CUSTOM_SQL_HYBRID_EMP_REF_INTEGRITY

  HYB__STAGING__FRESHNESS:
    entity_uri: "bigquery://projects/project-a/datasets/hybrid_staging/tables/hybrid_working_records"
    column_id: ingestion_timestamp
